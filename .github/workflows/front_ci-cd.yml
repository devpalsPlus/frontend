name: Front Deployment

on:
  push:
    branches:
      - develop

jobs:
  build:
    name: react build & deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Github Action
        uses: actions/checkout@v4

      - name: Get npm cache directory
        id: npm-cache-dir
        run: |
          echo "::set-output name=dir::$(npm config get cache)"

      - uses: actions/cache@v4
        id: npm-cache
        with:
          path: ${{ steps.npm-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install npm dependencies
        run: npm install

      - name: Set environment variables
        run: |
          echo "VITE_APP_API_BASE_URL=${{ secrets.VITE_APP_API_BASE_URL }}" >> .env.local
          echo "VITE_APP_IMAGE_CDN_URL=${{ secrets.VITE_APP_IMAGE_CDN_URL }}" >> .env.local
      - name: React Build
        env:
          VITE_APP_API_BASE_URL: ${{ secrets.VITE_APP_API_BASE_URL }}
          VITE_APP_IMAGE_CDN_URL: ${{ secrets.VITE_APP_IMAGE_CDN_URL }}
        run: npm run build

      - name: Verify Build Directory
        run: ls -la dist/

      - name: Remove original text files that have a compressed version
        run: |
          echo "Removing original text files if compressed version exists..."
          find dist/ -type f \( -iname "*.html" -o -iname "*.css" -o -iname "*.js" \) | while IFS= read -r file; do
            if [ -f "$file.gz" ]; then
              echo "Removing original file: $file (compressed version exists)"
              rm "$file"
            else
              echo "Keeping original file: $file (no compressed version found)"
            fi
          done

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_S3_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_S3_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Upload compressed files to S3 with header
        env:
          BUCKET_NAME: ${{ secrets.AWS_S3_BUCKET_NAME }}
        run: |
          echo "Uploading compressed files with gzip header..."
          find dist/ -type f -name "*.gz" | while IFS= read -r file; do
            key="${file%.gz}"
            echo "Uploading '$file' as '$key' with Content-Encoding: gzip"
            aws s3 cp "$file" "s3://${BUCKET_NAME}/${key}" \
              --content-encoding gzip \
              --metadata-directive REPLACE \
              --cache-control "max-age=31536000"
          done

      - name: Upload non-compressed files to S3
        env:
          BUCKET_NAME: ${{ secrets.AWS_S3_BUCKET_NAME }}
        run: |
          echo "Uploading non-compressed files..."
          aws s3 sync dist/ "s3://${BUCKET_NAME}" --exclude "*.gz" --delete

      - name: CloudFront Invalidation
        env:
          CLOUD_FRONT_ID: ${{ secrets.AWS_CLOUDFRONT_ID }}
        run: |
          echo "Creating CloudFront invalidation..."
          aws cloudfront create-invalidation --distribution-id $CLOUD_FRONT_ID --paths "/*"
